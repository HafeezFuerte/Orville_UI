<div *ngIf="isVisible"
    class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/40 backdrop-blur-[2px] animate-fade-in">
    <div class="max-w-sm w-full mx-4">
        <div class="box !bg-white dark:!bg-bodybg !border-0 shadow-2xl rounded-lg overflow-hidden">
            <div class="alert custom-alert1 alert-danger !mb-0 !rounded-none">
                <div class="flex justify-end pt-2 pe-2">
                    <button type="button" class="btn-close ms-auto text-gray-400 hover:text-gray-600"
                        (click)="onCancel()" aria-label="Close">
                        <i class="bi bi-x text-xl"></i>
                    </button>
                </div>
                <div class="text-center px-6 pb-8 pt-0">
                    <svg class="custom-alert-icon fill-danger inline-flex mb-4" xmlns="http://www.w3.org/2000/svg"
                        height="3.5rem" viewBox="0 0 24 24" width="3.5rem" fill="#000000">
                        <path d="M0 0h24v24H0z" fill="none" />
                        <path
                            d="M15.73 3H8.27L3 8.27v7.46L8.27 21h7.46L21 15.73V8.27L15.73 3zM12 17.3c-.72 0-1.3-.58-1.3-1.3 0-.72.58-1.3 1.3-1.3.72 0 1.3.58 1.3 1.3 0 .72-.58 1.3-1.3 1.3zm1-4.3h-2V7h2v6z" />
                    </svg>
                    <p class="text-defaulttextcolor dark:text-[#8c9097] dark:text-white/50 mb-6">
                        {{ message | translate }}
                    </p>
                    <div class="flex justify-center gap-2">
                        <button type="button" (click)="onCancel()"
                            class="ti-btn !py-1 !px-4 !text-[0.75rem] !font-medium ti-btn-outline-secondary">
                            {{ 'web.common.btnNo' | translate }}
                        </button>
                        <button type="button" (click)="onConfirm()"
                            class="ti-btn !py-1 !px-4 !text-[0.75rem] !font-medium bg-danger text-white">
                            {{ 'web.common.btnYes' | translate }}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
