<div class="table-responsive table-vertical-scroll w-full">
    <table class="table whitespace-nowrap ti-striped-table table-bordered min-w-full">
        <thead class="bg-info/10">
            <tr class="border-b border-defaultborder">
                <th scope="col" [class]="col.headerClass || 'text-start'" *ngFor="let col of columns" [style.width]="col.width" [style.min-width]="col.width">
                    <ng-container *ngIf="headerTemplate; else defaultHeader">
                        <ng-container *ngTemplateOutlet="headerTemplate; context: { col: col }"></ng-container>
                    </ng-container>
                    <ng-template #defaultHeader>
                        {{ col.label | translate }}
                    </ng-template>
                </th>
                <th scope="col" class="text-start" *ngIf="hasActions">
                    {{ 'web.common.lblAction' | translate }}
                </th>
            </tr>
        </thead>
        <tbody>
            <!-- Empty State -->
            <tr *ngIf="data.length === 0 && !loading">
                <td [attr.colspan]="columns.length + (hasActions ? 1 : 0)" class="text-center py-6 bg-gray-50/30">
                    <ng-container *ngIf="emptyTemplate; else defaultEmpty">
                        <ng-container *ngTemplateOutlet="emptyTemplate"></ng-container>
                    </ng-container>
                    <ng-template #defaultEmpty>
                        <span class="text-gray-500 italic text-sm">
                            {{ emptyMessage | translate }}
                        </span>
                    </ng-template>
                </td>
            </tr>

            <!-- Data Rows -->
            <ng-container *ngIf="!loading">
                <tr *ngFor="let row of data" class="border-b border-defaultborder task-list">
                    <td *ngFor="let col of columns" [style.width]="col.width" [style.min-width]="col.width" [class]="col.cellClass || ''">
                        <!-- Custom Content Projection based on Column Key -->
                        <ng-container *ngIf="colTemplate && (col.key === colTemplateName || col.useTemplate); else checkLink">
                            <ng-container *ngTemplateOutlet="colTemplate; context: { row: row, col: col }"></ng-container>
                        </ng-container>

                        <!-- Link Rendering -->
                        <ng-template #checkLink>
                            <ng-container *ngIf="col.isLink; else defaultData">
                                <span class="text-defaulttextcolor underline cursor-pointer font-medium" (click)="linkClick.emit({ row: row, col: col })">
                                    {{ row[col.key] || '-' }}
                                </span>
                            </ng-container>
                        </ng-template>

                        <!-- Default Data Rendering -->
                        <ng-template #defaultData>
                            <span
                                *ngIf="col.isHtml; else normalText"
                                [ngClass]="{'font-semibold': col.key === 'name'}">

                                {{ stripHtml(row[col.key]) }}

                            </span>
                            <ng-template #normalText>
                                <span [ngClass]="{'font-semibold': col.key === 'name'}">
                                    {{ row[col.key] || '-' }}
                                </span>
                            </ng-template>
                        </ng-template>
                    </td>
                    <!-- Action Column (Injected via ng-template) -->
                    <td *ngIf="hasActions">
                        <ng-container *ngTemplateOutlet="actionTemplate; context: { row: row }"></ng-container>
                    </td>
                </tr>
            </ng-container>
        </tbody>
    </table>

    <!-- Loading Spinner -->
    <div *ngIf="loading" class="flex flex-col items-center justify-center py-12 bg-gray-50/10 border-b border-x border-defaultborder">
        <div class="ti-spinner text-primary !w-8 !h-8 mb-2" role="status"></div>
        <span class="text-xs text-gray-500 font-medium tracking-wide">{{ 'web.common.lblLoading' | translate }}</span>
    </div>
</div>

<!-- Pagination -->
<mat-paginator *ngIf="!loading && totalRecords > 0" [length]="totalRecords" [pageSize]="pageSize"
    [pageIndex]="pageIndex" [pageSizeOptions]="[50]" showFirstLastButtons (page)="onPageChange($event)">
</mat-paginator>
