<div class="grid grid-cols-12 gap-6 mt-4">
    <!-- Left Panel -->
    <div class="col-span-12 lg:col-span-4">
        <ng-container
            *ngTemplateOutlet="leftPanel">
        </ng-container>
    </div>
    <!-- Right Panel -->
    <div class="col-span-12 lg:col-span-8">
        <div class="box bg-white border border-gray-100 rounded-xl overflow-hidden shadow-sm">
            <!-- Tabs -->
            <div class="border-b border-gray-100 bg-gray-50/50 p-2 overflow-x-auto whitespace-nowrap flex gap-1">
                <button
                    *ngFor="let tab of tabs"
                    (click)="changeTab(tab)"
                    class="px-4 py-2 text-xs rounded-md transition-all"
                    [class]="activeTab==tab.key
                    ?
                    'bg-white shadow-sm text-primary font-bold border-b-2 border-primary'
                    :
                    'text-gray-500 font-medium hover:text-gray-800'">
                    {{tab.label}}
                </button>
            </div>

            <!-- Body -->
          <div class="p-6">
    <!-- Content Layout -->
    <ng-container *ngIf="selectedTab?.layout === 'content'">
        <ng-container
            *ngTemplateOutlet="overview">
        </ng-container>
    </ng-container>

    <!-- Table Layout -->
    <ng-container *ngIf="selectedTab?.layout === 'table'">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-2 border-b border-gray-100 pb-3">
          <div>
            <h4 class="text-xs font-bold text-gray-800 m-0">{{ selectedTab?.label }}</h4>
          </div>
        <button
            type="button" *ngIf="selectedTab?.label !== 'Broadcasts'"
            class="ti-btn !py-1.5 !px-3 !text-[0.7rem] bg-primary text-white hover:bg-primary-hover flex items-center gap-1 shadow-sm font-semibold"
            (click)="openModal()">
    <i class="ri-add-line"></i>
    Add {{ selectedTab?.addButtonText }}
</button>
        </div>
<!-- Toolbar -->
<div
  *ngIf="selectedTab?.layout === 'table' || selectedTab?.layout === 'content-table'"
  class="flex flex-col md:flex-row justify-between items-center gap-3 mb-4">
  <!-- Search -->
  <div class="w-full md:w-96">
    <div class="input-group">
      <input [(ngModel)]="searchQuery"
      (keyup.enter)="search_with_keyword()"
        type="text"
        class="form-control"
        placeholder="Search">
      <button
        class="input-group-text bg-primary/10 text-primary" (click)="search_with_keyword()" >
        <i class="ri-search-line"></i>
      </button>
    </div>
    
  </div>

  <!-- Right Buttons -->
  <div class="flex gap-2">
    <button
      class="ti-btn ti-btn-light">
      <i class="ri-filter-3-line me-1"></i>
      {{ 'web.common.lblFilter' | translate }}
    </button>
    <button
      class="ti-btn ti-btn-light">
      <i class="ri-layout-column-line me-1"></i>
      {{ 'web.common.lblColumns' | translate }}
    </button>
  </div>
</div>
        <app-shared-table
            [columns]="selectedTab?.columns || []"
            [data]="selectedTab?.data || []"
            [loading]="selectedTab?.loading || false"
            [totalRecords]="selectedTab?.totalRecords || 0"
            [pageSize]="selectedTab?.pageSize || 50"
            [pageIndex]="selectedTab?.pageIndex || 0"
            [hasActions]="selectedTab?.hasActions || false"
            (notify_edit_action)="handleChildNotification($event)"
            >

        </app-shared-table>
    </ng-container>

    <!-- Content + Table -->
    <ng-container *ngIf="selectedTab?.layout === 'content-table'">
        <ng-container
            *ngTemplateOutlet="overview">
        </ng-container>
        <div class="mt-6">
            <app-shared-table
                [columns]="selectedTab?.columns || []"
                [data]="selectedTab?.data || []"
                [loading]="selectedTab?.loading || false"
                [totalRecords]="selectedTab?.totalRecords || 0"
                [pageSize]="selectedTab?.pageSize || 50"
                [pageIndex]="selectedTab?.pageIndex || 0"
                [hasActions]="selectedTab?.hasActions || false">

            </app-shared-table>
        </div>
    </ng-container>
</div>
        </div>
    </div>
</div>
<app-reusable-modal
    *ngIf="showModal"
    [title]="'Add ' + (selectedTab?.addButtonText || '')"
    subtitle="Enter details"
    (save)="onSave()"
    (close)="closeModal()">
    <app-common-area-popup
        *ngIf="selectedTab?.popupType === 'common-area'"
        [form]="selectedTab!.form!">
    </app-common-area-popup>
    <app-attachment-popup
        *ngIf="selectedTab?.popupType === 'attachment'"
        [form]="selectedTab!.form!"
        (fileSelected)="attachmentFileSelected.emit($event)">
    </app-attachment-popup>
    <app-notes-popup
     *ngIf="selectedTab?.popupType === 'notes'"
        [form]="selectedTab!.form!">
    </app-notes-popup>
</app-reusable-modal>
<app-confirm-popup
*ngIf="showConfirmModal" >
</app-confirm-popup>
