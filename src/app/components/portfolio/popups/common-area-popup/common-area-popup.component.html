
<form [formGroup]="form" class="space-y-5">

   
    <div>
        <label class="ti-form-label">
            {{ 'web.portfolio.popups.commonArea.lblAreaName' | translate }} <span class="text-danger">*</span>
        </label>
        <input
            type="text"
            class="ti-form-input"
            formControlName="areaName"
            placeholder="{{ 'web.portfolio.popups.commonArea.lblAreaNamePlaceHolder' | translate }}">

        <p class="text-[11px] text-gray-400 mt-1">
            {{ 'web.portfolio.popups.commonArea.lblAreaNameHint' | translate }}
        </p>
    </div>

    
    <div>
        <label class="ti-form-label">
            {{ 'web.portfolio.popups.commonArea.lblFloorNo' | translate }}
        </label>

        <input
            type="text"
            class="ti-form-input"
            formControlName="floor"
            placeholder="{{ 'web.portfolio.popups.commonArea.lblFloorNoPlaceHolder' | translate }}">
    </div>

</form>
