
<form [formGroup]="form" class="space-y-5">

   
    <div>
        <label class="ti-form-label">
            Area Name <span class="text-danger">*</span>
        </label>

        <input
            type="text"
            class="ti-form-input"
            formControlName="areaName"
            placeholder="Enter area name, e.g. Lobby, Gym, Rooftop">

        <p class="text-[11px] text-gray-400 mt-1">
            Use a clear name so tenants and staff can identify it easily.
        </p>
    </div>

    
    <div>
        <label class="ti-form-label">
            Floor No
        </label>

        <input
            type="text"
            class="ti-form-input"
            formControlName="floor"
            placeholder="Enter floor number, e.g. Ground, 1, 2">
    </div>

</form>
