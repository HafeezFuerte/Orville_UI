<div
  class="flex justify-center authentication authentication-basic items-center h-full text-defaultsize text-defaulttextcolor">
  <div class="grid grid-cols-12">
    <div class="xxl:col-span-4 xl:col-span-4 lg:col-span-4 md:col-span-3 sm:col-span-2"></div>
    <div class="xxl:col-span-4 xl:col-span-4 lg:col-span-4 md:col-span-6 sm:col-span-8 col-span-12">
      <div class="my-[2.5rem] flex justify-center">
        <a routerLink="/my-dashboard">
          <img src="./assets/images/brand-logos/desktop-logo.png" alt="logo" class="desktop-logo" />
          <img src="./assets/images/brand-logos/desktop-dark.png" alt="logo" class="desktop-dark" />
        </a>
      </div>
      <div class="box">
        <div class="box-body !p-[3rem]">
          <p class="h5 font-semibold mb-2 text-center">Sign In</p>
          <p class="mb-4 text-[#8c9097] dark:text-white/50 opacity-[0.7] font-normal text-center">
            Please enter your details to sign in
          </p>

          <!-- ✅ Use reactive form -->
          <form [formGroup]="loginForm" (ngSubmit)="login()">
            <!-- ✅ Error message -->
            <div *ngIf="error" class="text-danger mb-2">{{ error }}</div>

            <div class="grid grid-cols-12 gap-y-4">
              <div class="xl:col-span-12 col-span-12">
                <label for="signin-username" class="form-label text-default">Username</label>
                <input type="text" class="form-control form-control-lg w-full !rounded-md" id="signin-username"
                  placeholder="Username" formControlName="username" />
              </div>

              <div class="xl:col-span-12 col-span-12 mb-2">
                <label for="signin-password" class="form-label text-default block">Password
                  <a routerLink="/authentication/reset-password/basic"
                    class="ltr:float-right rtl:float-left text-danger">Forgot password ?</a>
                </label>
                <div class="input-group">
                  <input [type]="showPassword ? 'text' : 'password'" class="form-control form-control-lg !rounded-s-md"
                    id="signin-password" placeholder="Password" formControlName="password" />
                  <button aria-label="button" class="ti-btn ti-btn-light !rounded-s-none !mb-0" type="button"
                    (click)="toggleVisibility()">
                    <i class="ri-eye-{{ toggleClass }} align-middle"></i>
                  </button>
                </div>
              </div>

              <div class="xl:col-span-12 col-span-12 grid mt-2">
                <button type="submit" class="ti-btn ti-btn-primary !bg-primary !text-white !font-medium"
                  [disabled]="isLoading">
                  <span *ngIf="isLoading" class="ti-spinner !w-4 !h-4 text-white align-middle mr-1"
                    role="status"></span>
                  Sign In
                </button>
              </div>
            </div>
          </form>

          <!-- <div class="text-center">
            <p class="text-[0.75rem] text-[#8c9097] dark:text-white/50 mt-4">
              Don’t have an account?
              <a routerLink="/authentication/sign-up/basic" class="text-primary">Sign Up</a>
            </p>
          </div> -->

            <button aria-label="button" type="button" class="ti-btn ti-btn-icon ti-btn-light me-[0.365rem]">
              <i class="ri-facebook-line font-bold text-dark opacity-[0.7]"></i>
            </button>
            <button aria-label="button" type="button" class="ti-btn ti-btn-icon ti-btn-light me-[0.365rem]">
              <i class="ri-google-line font-bold text-dark opacity-[0.7]"></i>
            </button>
            <button aria-label="button" type="button" class="ti-btn ti-btn-icon ti-btn-light">
              <i class="ri-twitter-line font-bold text-dark opacity-[0.7]"></i>
            </button>
          </div> -->
        </div>
      </div>
    </div>
    <div class="xxl:col-span-4 xl:col-span-4 lg:col-span-4 md:col-span-3 sm:col-span-2"></div>
  </div>
</div>
